{% load static %}
<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panel de Control{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="{% url 'index_admin' %}" class="sidebar-logo-link">
                    <img src="{% static 'img/logo.svg' %}" alt="Transportes Silverado" class="sidebar-logo">
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="{% url "index_admin" %}" class="nav-item">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Inicio</span>
                </a>
                <a href="{% url "users" %}" class="nav-item">
                    <i data-lucide="users"></i>
                    <span>Usuarios</span>
                </a>
                <a href="{% url "maintenance" %}" class="nav-item">
                    <i data-lucide="wrench"></i>
                    <span>Mantenimiento</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="clipboard-list"></i>
                    <span>Actividades</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="settings"></i>
                    <span>Configuración</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <button id="menu-toggle" class="menu-btn"><i data-lucide="menu"></i></button>
                    <div class="topbar-right">
                        <div class="user-menu-container">
                            <div class="user-info" id="profile-menu-trigger" style="cursor: pointer;">
                                <span>{{ request.user.username|default:"Admin" }}</span>
                                <i data-lucide="user" class="user-icon"></i>
                            </div>
                            
                            <div class="dropdown-menu no-roundness" id="profile-dropdown" style="display: none;">
                                <a href="#" class="dropdown-item">
                                    <i data-lucide="settings" size="16"></i> Mi Perfil
                                </a>
                                <hr class="dropdown-divider">
                                <form action="{% url 'logout' %}" method="post" style="margin: 0;">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item logout-btn">
                                        <i data-lucide="log-out" size="16"></i> Cerrar Sesión
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
            </header>

            <div class="content-area">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="{% static 'js/base.js' %}"></script>
</body>
</html>
