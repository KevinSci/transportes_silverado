<div class="data-section no-roundness" style="max-width: 400px; margin: 50px auto;">
    <h3>Iniciar Sesión</h3>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label>Usuario:</label>
            <input type="text" name="username" class="filter-select" style="width: 100%;" required>
        </div>
        <div style="margin-bottom: 15px;">
            <label>Contraseña:</label>
            <input type="password" name="password" class="filter-select" style="width: 100%;" required>
        </div>
        <button type="submit" class="action-btn" style="width: 100%;">Ingresar</button>
    </form>
</div>
