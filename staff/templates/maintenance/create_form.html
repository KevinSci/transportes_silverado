{% extends 'mobile.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/staff_maintenance.css' %}">
{% endblock %}

{% block content %}
<form method="post" class="maintenance-form">
    {% csrf_token %}
    
    <div class="input-container">
        <label>UNIDAD</label>
        <select name="asset" class="field-staff" required>
            <option value="" disabled selected>Selecciona unidad...</option>
            {% for asset in assets %}
            <option value="{{ asset.id }}">{{ asset.number }} - {{ asset.get_asset_type_display }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="input-container">
        <label>TÍTULO DEL SERVICIO</label>
        <input type="text" name="title" class="field-staff" placeholder="Ej. Cambio de aceites y filtros" required>
    </div>

    <div class="form-grid-half">
        <div class="input-container">
            <label>TIPO</label>
            <select name="service_type" class="field-staff">
                <option value="correctivo">Correctivo</option>
                <option value="preventivo">Preventivo</option>
            </select>
        </div>
        <div class="input-container">
            <label>FECHA INICIO</label>
            <input type="datetime-local" name="start_date" class="field-staff" value="{{ now|date:'Y-m-d\TH:i' }}">
        </div>
    </div>

    <div class="input-container">
        <label>NOTAS / DESCRIPCIÓN</label>
        <textarea name="description" class="field-staff" rows="3" placeholder="Detalles adicionales..."></textarea>
    </div>

    <div class="section-divider">
        <div class="section-header-flex">
            <label class="section-title-label">PIEZAS E INSUMOS</label>
            <button type="button" id="add-supply-btn" class="add-supply-trigger">
                <i data-lucide="plus"></i>
            </button>
        </div>
        
        <div id="supplies-container">
            </div>
    </div>

    <div class="form-footer">
        <a href="{% url 'maintenance_list' %}" class="action-btn btn-secondary">
            Descartar
        </a>
        <button type="submit" class="action-btn btn-primary">
            Guardar Reporte
        </button>
    </div>
</form>

<template id="supply-row-template">
    <div class="supply-card no-roundness">
        <div class="supply-grid">
            <input type="text" name="supply_names[]" placeholder="Nombre de la pieza" class="field-staff supply-full" required>
            <input type="text" name="supply_brands[]" placeholder="Marca" class="field-staff">
            <input type="text" name="supply_models[]" placeholder="Modelo / Parte #" class="field-staff">
            <input type="number" name="supply_qtys[]" placeholder="Cant." class="field-staff supply-full" step="0.1" value="1">
            
            <div class="flex-between-center supply-full">
                <label class="purchase-option">
                    <input type="checkbox" class="purchase-checkbox"> ¿Necesario comprar?
                    <input type="hidden" name="supply_needs_purchase[]" value="false" class="purchase-hidden">
                </label>
                <button type="button" class="remove-supply-btn">Eliminar</button>
            </div>
        </div>
    </div>
</template>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/staff_maintenance.js' %}"></script>
{% endblock %}
